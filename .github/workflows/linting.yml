name: Linting

on:
    push:
        branches: [ main ]
    pull_request:
        branches: [ main ]

jobs:
    build:
        runs-on: ubuntu-latest
        permissions:
            contents: read
        steps:
            -   uses: actions/checkout@v6
            -   uses: actions/setup-node@v6
                with:
                    node-version: 22
                    cache: "npm"
            -   run: npm install standard
            -   run: npm run lint
